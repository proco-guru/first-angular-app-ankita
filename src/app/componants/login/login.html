<div class="min-h-screen flex">

  <!-- LEFT SIDE (Branding Section) -->
  <div class="hidden md:flex w-1/2 bg-gradient-to-br from-indigo-500 to-purple-500 text-white flex-col justify-center items-center p-10">

    <!-- App Name -->
    <h1 class="text-4xl font-bold mb-4">MyApp 🚀</h1>

    <!-- Tagline -->
    <p class="text-lg text-center max-w-md">
      Manage your tasks, track your progress and grow faster with our powerful platform.
    </p>

    <!-- Optional Illustration -->
    <img 
      src="https://illustrations.popsy.co/white/work-from-home.svg" 
      class="mt-10 w-80"
      alt="illustration"
    />
  </div>


  <!-- RIGHT SIDE (Form Section) -->
  <div class="w-full md:w-1/2 flex justify-center items-center bg-gray-100">

    <div class="bg-white p-8 rounded-xl shadow-lg w-96">

      <!-- Title -->
      <h2 class="text-2xl font-bold mb-2">Welcome Back 👋</h2>
      <p class="text-gray-500 mb-6">Login to your account</p>

      <!-- FORM -->
      <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">

        <!-- Email -->
        <div class="mb-4">
          <label class="block text-sm font-medium mb-1">Email</label>
          <input 
            type="email"
            name="email"
            ngModel
            required
            #email="ngModel"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none"
            placeholder="Enter your email"
          />

          <!-- Error -->
          <p class="text-red-500 text-xs mt-1" *ngIf="email.invalid && email.touched">
            Email is required
          </p>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label class="block text-sm font-medium mb-1">Password</label>
          <input 
            type="password"
            name="password"
            ngModel
            required
            minlength="6"
            #password="ngModel"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none"
            placeholder="Enter your password"
            />
            <!-- pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).+$" -->

          <p class="text-red-500 text-xs mt-1" *ngIf="password.invalid && password.touched">
            Minimum 6 characters required,Must contain uppercase, lowercase, and number
          </p>
        </div>

        <!-- Forgot + Remember -->
        <div class="flex justify-between items-center mb-4 text-sm">

          <label class="flex items-center gap-2">
            <input type="checkbox" class="accent-indigo-600" />
            Remember me
          </label>

          <a href="#" class="text-indigo-600 hover:underline">
            Forgot Password?
          </a>
        </div>

        <!-- Button -->
        <button 
          type="submit"
          [disabled]="loginForm.invalid"
          class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition disabled:bg-gray-400"
        >
          Login
        </button>

      </form>

      <!-- Divider -->
      <div class="flex items-center my-5">
        <div class="flex-1 h-px bg-gray-300"></div>
        <span class="px-3 text-gray-400 text-sm">OR</span>
        <div class="flex-1 h-px bg-gray-300"></div>
      </div>

      <!-- Social Login -->
      <button class="w-full border py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-gray-50">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5">
        Continue with Google
      </button>

      <!-- Signup -->
      <p class="text-sm text-center mt-5">
        Don’t have an account?
        <a href="#" class="text-indigo-600 font-medium hover:underline">
          Sign Up
        </a>
      </p>

    </div>

  </div>

</div>
