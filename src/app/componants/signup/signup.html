<div class="h-screen flex">

  <!-- LEFT SIDE (Brand / Visual) -->
  <div class="hidden md:flex w-1/2 bg-gradient-to-br from-black via-gray-900 to-gray-800 text-white flex-col justify-center px-16">

    <!-- Brand -->
    <h1 class="text-5xl font-serif leading-tight">
      Join the world of ideas.
    </h1>

    <p class="mt-6 text-lg text-gray-300 max-w-md">
      Create, share, and explore stories from writers across the globe.
    </p>

    <!-- Optional Illustration -->
    <img 
      src="https://illustrations.popsy.co/white/blogging.svg" 
      class="mt-10 w-80"
      alt="illustration"
    />

  </div>


  <!-- RIGHT SIDE (FORM) -->
  <div class="w-full md:w-1/2 flex justify-center items-center bg-gray-50">

    <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-md">

      <!-- Title -->
      <h2 class="text-2xl font-bold text-center">
        Create your account
      </h2>

      <p class="text-gray-500 text-sm text-center mt-1">
        Start your journey today ✨
      </p>

      <!-- FORM -->
      <form #signupForm="ngForm" (ngSubmit)="onSubmit(signupForm)" class="mt-6 space-y-4">

        <!-- Name -->
        <div>
          <label class="text-sm font-medium">Full Name</label>
          <input 
            type="text"
            name="name"
            ngModel
            required
            class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-black outline-none"
            placeholder="Enter your name"
          />
        </div>

        <!-- Email -->
        <div>
          <label class="text-sm font-medium">Email</label>
          <input 
            type="email"
            name="email"
            ngModel
            required
            email
            #email="ngModel"
            class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-black outline-none"
            placeholder="Enter your email"
          />

          <!-- Error -->
          <p class="text-red-500 text-xs mt-1" *ngIf="email.touched && email.invalid">
            Enter a valid email
          </p>
        </div>

        <!-- Password -->
        <div>
          <label class="text-sm font-medium">Password</label>
          <input 
            type="password"
            name="password"
            ngModel
            required
            minlength="6"
            pattern="^(?=.*[A-Z])(?=.*[a-z])(?=.*\d).+$"
            #password="ngModel"
            class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-black outline-none"
            placeholder="Enter your password"
          />

          <!-- Error -->
          <p class="text-red-500 text-xs mt-1" *ngIf="password.touched && password.invalid">
            Must contain 6+ chars, uppercase, lowercase & number
          </p>
        </div>

        <!-- Confirm Password -->
        <div>
          <label class="text-sm font-medium">Confirm Password</label>
          <input 
            type="password"
            name="confirmPassword"
            ngModel
            required
            #confirmPassword="ngModel"
            class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-black outline-none"
            placeholder="Confirm password"
          />
        </div>

        <!-- Button -->
        <button 
          type="submit"
          [disabled]="signupForm.invalid"
          class="w-full bg-black text-white py-2 rounded-lg hover:bg-gray-800 transition disabled:bg-gray-300">

          Sign Up
        </button>

      </form>

      <!-- Switch -->
      <p class="text-center text-sm text-gray-600 mt-4">
        Already have an account?
        <a class="text-black font-medium cursor-pointer hover:underline" routerLink="/">
          Sign In
        </a>
      </p>

    </div>

  </div>

</div>
